<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norric AB — Architecture Overview</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #1e1e1e;
    --text: #e8e4dc;
    --muted: #6b6560;
    --teal-fill: #0d2e22;
    --teal-stroke: #1a6b50;
    --teal-text: #5dcaa5;
    --purple-fill: #1a1430;
    --purple-stroke: #4a3a8a;
    --purple-text: #a78bfa;
    --blue-fill: #0a1628;
    --blue-stroke: #1a3456;
    --blue-text: #60a5fa;
    --coral-fill: #2a1410;
    --coral-stroke: #7a3020;
    --coral-text: #f0997b;
    --green-fill: #0a1f14;
    --green-stroke: #1a4028;
    --green-text: #4ade80;
    --amber-fill: #1a1200;
    --amber-stroke: #4a3200;
    --amber-text: #fbbf24;
    --gray-fill: #161616;
    --gray-stroke: #2a2a2a;
    --gray-text: #9a948c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 900px;
    position: relative;
    z-index: 1;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    letter-spacing: -0.02em;
  }

  .logo span { font-style: italic; color: var(--muted); }

  .meta {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  .diagram-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
  }

  svg { display: block; width: 100%; }

  /* SVG node styles */
  .node { cursor: pointer; }
  .node:hover rect, .node:hover .box-rect { opacity: 0.85; }

  .teal-box   { fill: var(--teal-fill);   stroke: var(--teal-stroke);   }
  .purple-box { fill: var(--purple-fill); stroke: var(--purple-stroke); }
  .blue-box   { fill: var(--blue-fill);   stroke: var(--blue-stroke);   }
  .coral-box  { fill: var(--coral-fill);  stroke: var(--coral-stroke);  }
  .green-box  { fill: var(--green-fill);  stroke: var(--green-stroke);  }
  .amber-box  { fill: var(--amber-fill);  stroke: var(--amber-stroke);  }
  .gray-box   { fill: var(--gray-fill);   stroke: var(--gray-stroke);   }

  .teal-title   { fill: var(--teal-text);   font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; }
  .purple-title { fill: var(--purple-text); font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; }
  .blue-title   { fill: var(--blue-text);   font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; }
  .coral-title  { fill: var(--coral-text);  font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; }
  .green-title  { fill: var(--green-text);  font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; }
  .amber-title  { fill: var(--amber-text);  font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; }
  .gray-title   { fill: var(--gray-text);   font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; }

  .sub { fill: #6b6560; font-family: 'Geist Mono', monospace; font-size: 10px; }

  .layer-label { fill: #3a3530; font-family: 'Geist Mono', monospace; font-size: 9px; letter-spacing: 0.15em; }

  .connector { stroke: #2a2a2a; stroke-width: 1; fill: none; }
  .connector-arrow { stroke: #2a2a2a; stroke-width: 1; fill: none; marker-end: url(#arr); }

  .legend-label { fill: var(--muted); font-family: 'Geist Mono', monospace; font-size: 10px; }

  footer {
    margin-top: 24px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 900px;
    position: relative;
    z-index: 1;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
